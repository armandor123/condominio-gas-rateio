services:
  postgres:
    image: postgres:16
    container_name: gas-rateio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gasrateiodb
      POSTGRES_USER: gasrateio
      POSTGRES_PASSWORD: gasrateio123
    ports:
      - "5434:5432"
    volumes:
      - gas_rateio_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gasrateio -d gasrateiodb"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: gas-rateio-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: gas-rateio-api
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started

volumes:
  gas_rateio_postgres_data:
