services:
  postgres:
    image: postgres:16
    container_name: gas-rateio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gasrateiodb
      POSTGRES_USER: gasrateio
      POSTGRES_PASSWORD: gasrateio123
    ports:
      - "5434:5432"
    volumes:
      - gas_rateio_postgres_data:/var/lib/postgresql/data

volumes:
  gas_rateio_postgres_data:
