spring.application.name=gas-rateio-api
server.port=8080

spring.datasource.url=jdbc:postgresql://postgres:5432/gasrateiodb
spring.datasource.username=gasrateio
spring.datasource.password=gasrateio123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.seed.demo-enabled=true
